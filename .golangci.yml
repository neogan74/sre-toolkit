version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors 
    - govet         # Reports suspicious constructs
    - ineffassign   # Detects ineffectual assignments
    - staticcheck   # Advanced go vet
    - unused        # Checks for unused code
    - misspell      # Finds commonly misspelled words
    - revive        # Replacement for golint
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Reports unused function parameters
    - gosec         # Security checks
    - bodyclose     # Checks HTTP response body is closed
    - noctx         # Finds sending HTTP requests without context
    - errname       # Checks error naming conventions
    - errorlint     # Find error wrapping issues
    - gocritic      # Provides diagnostics for bugs, performance, style
    - gocyclo       # Computes cyclomatic complexity
    - dupl          # Code clone detection
    - prealloc      # Find slice declarations that could potentially be preallocated

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - (io.Writer).Write
        - (io.Closer).Close
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (*text/tabwriter.Writer).Flush
        - (*net/http.Response).Body.Close
        - (*github.com/spf13/viper.Viper).BindPFlag
        - github.com/spf13/viper.BindPFlag

    govet:
      enable-all: true
      disable:
        - fieldalignment  # Low priority memory optimization
        - shadow          # Common pattern in Go, often false positives

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 100

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - rangeValCopy  # Often unavoidable with Kubernetes types
        - hugeParam     # Large structs are common in Kubernetes/operator code

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: var-naming
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false

    gosec:
      excludes:
        - G104 # Audit errors not checked - covered by errcheck
        - G117 # Exported field names matching secret pattern - legitimate config field names

  exclusions:
    rules:
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - gocritic
          - noctx

      # Exclude weak cryptographic primitive warnings
      - text: "weak cryptographic primitive"
        linters:
          - gosec

      # Exclude deferred calls from errcheck
      - source: "defer"
        linters:
          - errcheck

      - linters:
          - typecheck
        text: "undefined: yaml"
      - linters:
          - typecheck
        text: "missing type in composite literal"
      - linters:
          - typecheck
        text: "declared and not used"
      - linters:
          - typecheck
        text: "undefined .*field or method"
      - linters:
          - typecheck
        text: "could not import sync/atomic"
      - linters:
          - typecheck
        text: "Called undefined"
      - linters:
          - typecheck
        text: ".On undefined"

      # Exclude revive var-naming false positives for test packages sharing stdlib names
      - path: "_test\\.go"
        linters:
          - revive
        text: "avoid package names that conflict"
