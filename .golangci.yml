version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
    - unparam
    - gosec
    - bodyclose
    - noctx
    - errname
    - errorlint
    - gocritic
    - gocyclo
    - dupl
    - prealloc

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - (io.Writer).Write
        - (io.Closer).Close
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (*text/tabwriter.Writer).Flush
        - (*net/http.Response).Body.Close
        - (*github.com/spf13/viper.Viper).BindPFlag
        - github.com/spf13/viper.BindPFlag

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 100

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - rangeValCopy

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: var-naming
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false

    gosec:
      excludes:
        - G104

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - gocritic

      - text: "weak cryptographic primitive"
        linters:
          - gosec

      - source: "defer"
        linters:
          - errcheck

      - text: "undefined: yaml"
        linters:
          - typecheck
      - text: "missing type in composite literal"
        linters:
          - typecheck
      - text: "declared and not used"
        linters:
          - typecheck
      - text: "undefined .*field or method"
        linters:
          - typecheck
      - text: "could not import sync/atomic"
        linters:
          - typecheck
      - text: "Called undefined"
        linters:
          - typecheck
      - text: ".On undefined"
        linters:
          - typecheck