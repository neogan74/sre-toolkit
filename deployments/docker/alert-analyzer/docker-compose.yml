version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: alert-analyzer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - alert-analyzer

  alert-analyzer-monitor:
    image: golang:1.26
    container_name: alert-analyzer-monitor
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        go run ./cmd/alert-analyzer monitor \
          --prometheus-url http://prometheus:9090 \
          --lookback 24h \
          --resolution 1m \
          --top-n 10 \
          --show-flapping \
          --show-correlation \
          --show-temporal-patterns \
          --show-recommendations \
          --interval 1m \
          --metrics-address :8080
    volumes:
      - ../../..:/workspace
      - alert_analyzer_gocache:/tmp/gocache
    environment:
      - GOCACHE=/tmp/gocache
    depends_on:
      - prometheus
    networks:
      - alert-analyzer

  # Sample application that generates metrics
  sample-app:
    image: prom/node-exporter:latest
    container_name: alert-analyzer-sample-app
    ports:
      - "9100:9100"
    networks:
      - alert-analyzer

  # Grafana for future dashboard testing
  grafana:
    image: grafana/grafana:latest
    container_name: alert-analyzer-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - alert-analyzer

volumes:
  alert_analyzer_gocache:
  prometheus_data:
  grafana_data:

networks:
  alert-analyzer:
    driver: bridge
