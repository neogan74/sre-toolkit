global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sample-app'
    static_configs:
      - targets: ['sample-app:9100']
        labels:
          service: 'sample-app'
          environment: 'dev'

  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']
        labels:
          service: 'victoriametrics'
